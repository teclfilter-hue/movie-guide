<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instruction Video</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#container{
    width:100%;
    max-width:900px;
    padding:20px;
    text-align:center;
    box-sizing:border-box;
}

h1{
    margin-bottom:20px;
}

video{
    width:100%;
    border-radius:12px;
    background:#000;
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    background:#fff;
    color:#000;
    font-weight:bold;
}

#status{
    margin-top:15px;
    opacity:0.8;
}

</style>
</head>

<body>

<div id="container">

    <h1 id="title">Loading...</h1>

    <video
        id="video"
        controls
        playsinline
        webkit-playsinline
        preload="metadata"
    >
        <source id="source" src="">
    </video>

    <div id="status">
        Detecting language...
    </div>

    <div class="buttons">

        <button onclick="setJapanese()">
            🇯🇵 日本語
        </button>

        <button onclick="setEnglish()">
            🇺🇸 English
        </button>

    </div>

</div>

<script>

const video = document.getElementById('video');
const source = document.getElementById('source');
const title = document.getElementById('title');
const statusText = document.getElementById('status');

function setJapanese(){

    title.innerText = '操作説明動画';

    source.src = './japanese.mp4';

    video.load();

    statusText.innerText = '日本語動画';

}

function setEnglish(){

    title.innerText = 'Instruction Video';

    source.src = './english.mp4';

    video.load();

    statusText.innerText = 'English Video';

}

function detectLanguage(){

    const lang = (
        navigator.language ||
        navigator.userLanguage ||
        'en'
    ).toLowerCase();

    console.log(lang);

    if(lang.startsWith('ja')){

        setJapanese();

    }else{

        setEnglish();

    }

}

video.addEventListener('error', function(){

    statusText.innerHTML = `
        動画を読み込めません。<br>
        ファイル名を確認してください。
    `;

});

detectLanguage();

</script>

</body>
</html>

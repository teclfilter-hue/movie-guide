```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Instruction Video</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#container{
    width:100%;
    max-width:900px;
    padding:20px;
    box-sizing:border-box;
    text-align:center;
}

h1{
    margin:0 0 20px;
    font-size:28px;
    font-weight:700;
}

video{
    width:100%;
    max-height:70vh;
    background:#000;
    border-radius:14px;
}

#loading{
    margin-top:20px;
    font-size:18px;
    opacity:0.8;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:14px 22px;
    font-size:18px;
    cursor:pointer;
    background:#fff;
    color:#000;
    font-weight:bold;
}

button:active{
    transform:scale(0.98);
}

#playButton{
    margin-top:18px;
    display:none;
    width:100%;
    max-width:320px;
}

</style>
</head>

<body>

<div id="container">

    <h1 id="title">Loading...</h1>

    <video
        id="videoPlayer"
        controls
        playsinline
        webkit-playsinline
        preload="auto"
    >
        <source id="videoSource" src="" type="video/mp4">
    </video>

    <div id="loading">
        Detecting language...
    </div>

    <button id="playButton">
        ▶ TAP TO PLAY
    </button>

    <div class="buttons">

        <button onclick="setLanguage('ja')">
            🇯🇵 日本語
        </button>

        <button onclick="setLanguage('en')">
            🇺🇸 English
        </button>

    </div>

</div>

<script>

const videoPlayer = document.getElementById('videoPlayer');
const videoSource = document.getElementById('videoSource');
const title = document.getElementById('title');
const loading = document.getElementById('loading');
const playButton = document.getElementById('playButton');

let currentLanguage = 'en';

/*
========================================
動画ファイル名
========================================

同じフォルダへ配置

index.html
japanese.mp4
english.mp4

========================================
*/

function setLanguage(lang){

    currentLanguage = lang;

    if(lang === 'ja'){

        title.innerText = '操作説明動画';
        loading.innerText = '動画を読み込み中...';

        videoSource.src = 'japanese.mp4';

    }else{

        title.innerText = 'Instruction Video';
        loading.innerText = 'Loading video...';

        videoSource.src = 'english.mp4';

    }

    videoPlayer.load();

    attemptAutoplay();
}

function attemptAutoplay(){

    const promise = videoPlayer.play();

    if(promise !== undefined){

        promise.then(() => {

            loading.style.display = 'none';
            playButton.style.display = 'none';

        }).catch(() => {

            // iPhone対策
            loading.style.display = 'none';
            playButton.style.display = 'inline-block';

        });

    }
}

function detectLanguage(){

    const lang =
        navigator.language ||
        navigator.userLanguage ||
        navigator.browserLanguage ||
        'en';

    console.log('Detected Language:', lang);

    const lower = lang.toLowerCase();

    if(lower.startsWith('ja')){

        setLanguage('ja');

    }else{

        setLanguage('en');

    }
}

playButton.addEventListener('click', () => {

    videoPlayer.play();

    playButton.style.display = 'none';

});

videoPlayer.addEventListener('loadeddata', () => {

    console.log('Video loaded');

});

videoPlayer.addEventListener('error', (e) => {

    console.log('Video error:', e);

    loading.innerHTML = `
        Video could not be loaded.<br>
        Please check file names.
    `;

});

detectLanguage();

</script>

</body>
</html>

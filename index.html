<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>操作説明動画</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

#container{
  width:100%;
  max-width:900px;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

video{
  width:100%;
  max-height:70vh;
  background:#000;
  border-radius:12px;
}

h1{
  margin-bottom:20px;
  font-size:28px;
}

.buttons{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:14px 24px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  background:#ffffff;
  color:#000;
  transition:0.2s;
}

button:hover{
  opacity:0.8;
}

#loading{
  font-size:20px;
}
</style>
</head>

<body>

<div id="container">

  <h1 id="title">Loading...</h1>

  <video
    id="videoPlayer"
    controls
    playsinline
    autoplay
  >
    <source id="videoSource" src="" type="video/mp4">
    Your browser does not support video.
  </video>

  <div class="buttons">
    <button onclick="setLanguage('ja')">
      🇯🇵 日本語
    </button>

    <button onclick="setLanguage('en')">
      🇺🇸 English
    </button>
  </div>

</div>

<script>
const videoPlayer = document.getElementById('videoPlayer');
const videoSource = document.getElementById('videoSource');
const title = document.getElementById('title');

/*
---------------------------------------
動画ファイル名
---------------------------------------
同じフォルダに置いてください

japanese.mp4
english.mp4
---------------------------------------
*/

function setLanguage(lang){

  if(lang === 'ja'){

    title.innerText = '操作説明動画';
    videoSource.src = 'japanese.mp4';

  }else{

    title.innerText = 'Instruction Video';
    videoSource.src = 'english.mp4';

  }

  videoPlayer.load();

  // 自動再生
  const playPromise = videoPlayer.play();

  if (playPromise !== undefined) {
    playPromise.catch(error => {
      console.log('Autoplay blocked');
    });
  }

  // 次回アクセス用に保存
  localStorage.setItem('selectedLanguage', lang);
}

function detectLanguage(){

  // 保存済み優先
  const savedLang = localStorage.getItem('selectedLanguage');

  if(savedLang){
    setLanguage(savedLang);
    return;
  }

  // ブラウザ言語取得
  const browserLang =
    navigator.language ||
    navigator.userLanguage;

  // 日本語判定
  if(browserLang.startsWith('ja')){
    setLanguage('ja');
  }else{
    setLanguage('en');
  }
}

detectLanguage();
</script>

</body>
</html>
